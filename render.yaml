services:
  - type: web
    name: listenlearn
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-5-mini
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: DEFAULT_VOICE
        value: marin
      - key: MAX_SOURCES
        value: "5"
